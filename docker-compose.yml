version: "3.9"

services:

  backend:
    build:
      context: ./srgs_backend
      dockerfile: Dockerfile
    container_name: backend-app
    ports:
      - "8080:8080"
    environment:
      - QUARKUS_HTTP_HOST=0.0.0.0
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
    networks:
      - app-network

  frontend:
    build:
      context: ./srgs_frontend
      dockerfile: Dockerfile
    container_name: frontend-app
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge